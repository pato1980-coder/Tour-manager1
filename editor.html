<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Editor de Tours</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--b:#5bb8f5;--g:#5edd8a;--r:#e06060;--p:#b07ef5;--o:#f5a623;--mo:'Courier New',monospace;--bg:#0a0c12;--card:rgba(17,21,32,.98);--border:rgba(255,255,255,.08)}
html,body{height:100%;background:var(--bg);font-family:system-ui,sans-serif;color:#e8e6df;overflow:hidden}

#app{display:flex;height:100vh;flex-direction:column}
header{display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:rgba(10,12,18,.98);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100}
.back-btn{background:rgba(255,255,255,.07);border:1px solid var(--border);color:#e8e6df;border-radius:8px;padding:8px 12px;font-family:var(--mo);font-size:10px;cursor:pointer;transition:background .15s}
.back-btn:hover{background:rgba(255,255,255,.12)}
#hd-title{flex:1;font-family:var(--mo);font-size:13px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hbtn{height:34px;padding:0 14px;border-radius:8px;border:none;font-family:var(--mo);font-size:10px;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:all .15s;white-space:nowrap}
.hbtn-p{background:var(--b);color:#0a0c12}
.hbtn-p:hover{opacity:.85}
.hbtn-g{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);border:1px solid var(--border)}
.hbtn-g:hover{background:rgba(255,255,255,.12)}
.hbtn-r{background:rgba(94,221,138,.12);color:var(--g);border:1px solid rgba(94,221,138,.2)}

#main{display:flex;flex:1;overflow:hidden}

#sidebar{width:340px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border);background:rgba(10,12,18,.98)}
@media(max-width:700px){
  #main{flex-direction:column}
  #sidebar{width:100%;height:50vh;border-right:none;border-bottom:1px solid var(--border)}
  #map-wrap{height:50vh}
}
#sidebar-scroll{flex:1;overflow-y:auto;padding:14px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
#sidebar-scroll::-webkit-scrollbar{width:4px}
#sidebar-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

.meta-section{margin-bottom:16px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:12px}
.meta-section h3{font-family:var(--mo);font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.field{margin-bottom:10px}
label{font-family:var(--mo);font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:4px}
input[type=text],input[type=time],select,textarea{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:7px;color:#e8e6df;font-family:inherit;font-size:13px;padding:8px 10px;width:100%;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:rgba(91,184,245,.4)}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,.2)}
.field-row{display:flex;gap:8px}
.field-row .field{flex:1}

.stops-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.stops-hd span{font-family:var(--mo);font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.1em;text-transform:uppercase}
.add-stop-btn{background:rgba(94,221,138,.1);color:var(--g);border:1px solid rgba(94,221,138,.2);border-radius:7px;padding:6px 12px;font-family:var(--mo);font-size:9px;font-weight:700;cursor:pointer;transition:all .15s}
.add-stop-btn:hover{background:rgba(94,221,138,.2)}
.day-section-hd{display:flex;align-items:center;justify-content:space-between;gap:8px;font-family:var(--mo);font-size:9px;color:var(--b);letter-spacing:.08em;text-transform:uppercase;margin:14px 0 8px;padding-bottom:6px;border-bottom:1px solid rgba(91,184,245,.15)}
.day-section-hd .add-stop-btn{flex-shrink:0}
.day-empty{padding:10px 0;font-family:var(--mo);font-size:9px;color:rgba(255,255,255,.25)}
.day-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:8px}
.day-row .field{margin-bottom:0}
.day-row .stop-act{margin-bottom:9px;font-size:14px}

.stop-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:border-color .15s}
.stop-card.active{border-color:rgba(91,184,245,.4)}
.stop-head{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:background .12s}
.stop-head:hover{background:rgba(255,255,255,.03)}
.stop-num{width:24px;height:24px;border-radius:50%;background:var(--b);color:#0a0c12;font-family:var(--mo);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stop-num.first{background:var(--g)}
.stop-name-preview{flex:1;font-size:13px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stop-time-preview{font-family:var(--mo);font-size:9px;color:rgba(255,255,255,.35);flex-shrink:0}
.stop-actions{display:flex;gap:6px;flex-shrink:0}
.stop-act{background:none;border:none;font-size:14px;cursor:pointer;padding:2px 4px;opacity:.4;transition:opacity .15s;color:#fff}
.stop-act:hover{opacity:1}
.stop-body{display:none;padding:0 12px 12px;border-top:1px solid var(--border)}
.stop-body.open{display:block}
.stop-map-hint{font-family:var(--mo);font-size:9px;color:rgba(91,184,245,.6);margin-bottom:8px;margin-top:8px;padding:6px 8px;background:rgba(91,184,245,.06);border-radius:6px;border:1px solid rgba(91,184,245,.15)}
.coords-row{display:flex;gap:6px;margin-bottom:8px}
.coords-row input{font-family:var(--mo);font-size:11px}
.tags-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tag-chip{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:3px 8px;font-family:var(--mo);font-size:9px;color:rgba(255,255,255,.6)}
.tag-chip .del-tag{background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:12px;padding:0;line-height:1}
.tag-chip .del-tag:hover{color:var(--r)}
.add-tag-row{display:flex;gap:6px}
.add-tag-row input{flex:1;font-size:11px;padding:6px 8px}
.add-tag-row select{width:80px;font-size:11px;padding:6px 4px}
.add-tag-row button{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:7px;color:#e8e6df;font-size:13px;cursor:pointer;padding:6px 10px}
.drop-pin-btn{width:100%;padding:8px;border-radius:7px;border:1px dashed rgba(91,184,245,.3);background:rgba(91,184,245,.05);color:var(--b);font-family:var(--mo);font-size:9px;cursor:pointer;margin-top:4px;transition:all .15s}
.drop-pin-btn:hover{background:rgba(91,184,245,.1)}
.drop-pin-btn.waiting{border-style:solid;background:rgba(91,184,245,.12);animation:pulse .8s ease-in-out infinite alternate}
@keyframes pulse{from{opacity:.7}to{opacity:1}}
.geo-search{position:relative}
.geo-results{position:absolute;top:100%;left:0;right:0;z-index:30;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-top:4px;max-height:180px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.geo-results.on{display:block}
.geo-result{padding:8px 10px;font-size:11px;line-height:1.3;color:rgba(255,255,255,.8);cursor:pointer;border-bottom:1px solid var(--border)}
.geo-result:last-child{border-bottom:none}
.geo-result:hover{background:rgba(91,184,245,.12)}
.geo-result.disabled{cursor:default;color:rgba(255,255,255,.35)}
.geo-result.disabled:hover{background:none}

#map-wrap{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%}
.map-hint{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:500;
  background:rgba(10,12,18,.9);border:1px solid rgba(91,184,245,.3);border-radius:20px;
  padding:7px 16px;font-family:var(--mo);font-size:10px;color:var(--b);
  pointer-events:none;white-space:nowrap;display:none}
.map-hint.on{display:block}

#export-panel{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
#export-panel.open{opacity:1;pointer-events:all}
.ep-box{background:rgba(11,14,22,.99);border-radius:18px 18px 0 0;width:100%;max-width:480px;padding:20px 22px 32px;transform:translateY(30px);transition:transform .3s cubic-bezier(.4,0,.2,1);border-top:1px solid var(--border)}
#export-panel.open .ep-box{transform:translateY(0)}
.ep-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);margin:0 auto 16px}
.ep-t{font-size:17px;font-weight:700;color:#fff;margin-bottom:4px}
.ep-s{font-family:var(--mo);font-size:9px;color:rgba(255,255,255,.35);margin-bottom:18px;line-height:1.7}
.ep-btns{display:flex;gap:10px}
.ep-btn{flex:1;padding:13px 8px;border-radius:10px;border:none;font-family:var(--mo);font-size:10px;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.ep-btn-p{background:var(--b);color:#0a0c12}
.ep-btn-g{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);border:1px solid var(--border)}
.ep-btn-s{background:rgba(94,221,138,.12);color:var(--g);border:1px solid rgba(94,221,138,.2)}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);z-index:9999;
  background:rgba(20,26,44,.98);color:#fff;font-family:var(--mo);font-size:10px;
  padding:8px 16px;border-radius:20px;opacity:0;transition:opacity .2s,transform .2s;
  pointer-events:none;white-space:nowrap;box-shadow:0 2px 16px rgba(0,0,0,.6);max-width:90vw}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="app">
  <header>
    <button class="back-btn" onclick="confirmBack()">← Volver</button>
    <div id="hd-title">Nuevo tour</div>
    <button class="hbtn hbtn-g" id="preview-btn" onclick="preview()" style="display:none">👁 Ver</button>
    <button class="hbtn hbtn-r" onclick="openExport()">⬇ Exportar</button>
    <button class="hbtn hbtn-p" onclick="save()">💾 Guardar</button>
  </header>
  <div id="main">
    <div id="sidebar">
      <div id="sidebar-scroll">
        <div class="meta-section">
          <h3>Información del tour</h3>
          <div class="field-row">
            <div class="field" style="max-width:60px">
              <label>Emoji</label>
              <input type="text" id="t-emoji" value="📍" maxlength="4" style="text-align:center;font-size:20px;padding:4px">
            </div>
            <div class="field" style="flex:1">
              <label>Ciudad / Nombre</label>
              <input type="text" id="t-city" placeholder="Ej: Madrid" oninput="updateTitle()">
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label>País</label>
              <input type="text" id="t-country" placeholder="España">
            </div>
            <div class="field">
              <label>Duración total</label>
              <input type="text" id="t-duration" placeholder="5h">
            </div>
          </div>
        </div>

        <!-- Days -->
        <div class="meta-section">
          <h3>Días del tour</h3>
          <div id="days-list"></div>
          <button class="add-stop-btn" onclick="addDay()">+ Añadir día</button>
        </div>
        <div>
          <div class="stops-hd">
            <span>Paradas (<span id="stop-count">0</span>)</span>
          </div>
          <div id="stops-list"></div>
          <div id="stops-empty" style="padding:24px;text-align:center;font-family:var(--mo);font-size:10px;color:rgba(255,255,255,.25)">
            Añade paradas usando el botón de arriba<br>o haz clic en el mapa para colocarlas
          </div>
        </div>
      </div>
    </div>
    <div id="map-wrap">
      <div id="map"></div>
      <div class="map-hint" id="map-hint">📍 Haz clic para colocar la parada</div>
    </div>
  </div>
</div>

<div id="export-panel" onclick="closeExport()">
  <div class="ep-box" onclick="event.stopPropagation()">
    <div class="ep-handle"></div>
    <div class="ep-t">⬇ Exportar tour</div>
    <div class="ep-s">Descarga el tour como archivo JSON para importarlo en otro dispositivo, o comparte el enlace directo.</div>
    <div class="ep-btns">
      <button class="ep-btn ep-btn-g" onclick="closeExport()">Cancelar</button>
      <button class="ep-btn ep-btn-s" onclick="copyLink()">🔗 Copiar link</button>
      <button class="ep-btn ep-btn-p" onclick="downloadJSON()">⬇ Descargar JSON</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const params=new URLSearchParams(location.search);
const EDIT_ID=params.get('id');
const LS={
  get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};

let stops=[];
let days=[{date:'',start:'09:00'}];
let map=null;
let placingStopIdx=null;
let editingStop=null;
const stopMarkers=[];
let routeLine=null;

function getTourMeta(){
  return{
    id:EDIT_ID||('tour_'+Date.now()),
    city:document.getElementById('t-city').value.trim()||'Mi Tour',
    country:document.getElementById('t-country').value.trim(),
    emoji:document.getElementById('t-emoji').value.trim()||'📍',
    duration:document.getElementById('t-duration').value.trim()||'?h',
    startTime:days[0]?.start||'09:00',
  };
}

/* ══ DAYS ══ */
function fmtDateLong(iso){
  if(!iso)return'';
  const d=new Date(iso+'T00:00:00');
  if(isNaN(d))return'';
  return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
function fmtDateShort(iso){
  if(!iso)return'';
  const d=new Date(iso+'T00:00:00');
  if(isNaN(d))return'';
  return d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
}
function renderDaysList(){
  const el=document.getElementById('days-list');
  el.innerHTML=days.map((d,i)=>`
    <div class="day-row">
      <div class="field" style="flex:1.4">
        <label>Día ${i+1} — Fecha</label>
        <input type="date" value="${d.date||''}" onchange="setDayDate(${i},this.value)">
      </div>
      <div class="field" style="max-width:90px">
        <label>Inicio</label>
        <input type="time" value="${d.start||'09:00'}" onchange="setDayStart(${i},this.value)">
      </div>
      ${days.length>1?`<button class="stop-act" title="Eliminar día" onclick="removeDay(${i})">🗑</button>`:''}
    </div>`).join('');
}
function setDayDate(i,v){days[i].date=v;renderStopsList()}
function setDayStart(i,v){days[i].start=v||'09:00';recalcTimes();renderStopsList()}
function addDay(){
  days.push({date:'',start:'09:00'});
  renderDaysList();
  toast('✓ Día '+days.length+' añadido');
}
function removeDay(i){
  const dayNum=i+1;
  const affected=stops.filter(s=>s.day===dayNum).length;
  if(affected&&!confirm(`Día ${dayNum} tiene ${affected} parada(s). Se eliminarán también. ¿Continuar?`))return;
  stops=stops.filter(s=>s.day!==dayNum);
  stops.forEach(s=>{if(s.day>dayNum)s.day--});
  days.splice(i,1);
  recalcTimes();renderDaysList();renderStopsList();renderMarkers();updateRoute();
  toast('🗑 Día eliminado');
}
function updateTitle(){
  const city=document.getElementById('t-city').value.trim()||'Nuevo tour';
  document.getElementById('hd-title').textContent=city;
}

let tt_=null;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');if(tt_)clearTimeout(tt_);tt_=setTimeout(()=>t.classList.remove('on'),2800)}

window.addEventListener('load',()=>{
  map=L.map('map',{center:[40.416,-3.703],zoom:6,zoomControl:true,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19,attribution:'© OSM CARTO'}).addTo(map);
  L.control.attribution({position:'bottomright',prefix:false}).addTo(map);
  map.on('click',onMapClick);
  renderDaysList();
  if(EDIT_ID)loadExisting();
});

function onMapClick(e){
  if(placingStopIdx===null)return;
  const{lat,lng}=e.latlng;
  stops[placingStopIdx].lat=parseFloat(lat.toFixed(6));
  stops[placingStopIdx].lng=parseFloat(lng.toFixed(6));
  const placedIdx=placingStopIdx;
  stopPlacing();
  renderStopsList();
  renderMarkers();
  updateRoute();
  setActiveStop(placedIdx);
  reverseGeocode(placedIdx);
}

function startPlacing(idx){
  placingStopIdx=idx;
  document.getElementById('map-hint').classList.add('on');
  map.getContainer().style.cursor='crosshair';
  toast('📍 Haz clic en el mapa para ubicar la parada');
}
function stopPlacing(){
  placingStopIdx=null;
  document.getElementById('map-hint').classList.remove('on');
  map.getContainer().style.cursor='';
}

function genId(){return 's'+Date.now()+Math.random().toString(36).slice(2,6)}
function defaultStop(dayNum){
  const day=days[dayNum-1]||days[0];
  const startTime=day?.start||'09:00';
  let[h,m]=startTime.split(':').map(Number);
  stops.filter(s=>s.day===dayNum).forEach(s=>{m+=s.stayMin+10;h+=Math.floor(m/60);m%=60});
  return{_id:genId(),day:dayNum,name:'Parada',time:`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`,dur:'30 min · gratis',stayMin:30,desc:'',lat:null,lng:null,address:'',tags:[],wiki:''};
}

function addStop(dayNum){
  dayNum=dayNum||days.length;
  const s=defaultStop(dayNum);
  let insertAt=stops.length;
  for(let i=0;i<stops.length;i++){if(stops[i].day>dayNum){insertAt=i;break}}
  stops.splice(insertAt,0,s);
  renderStopsList();
  renderMarkers();
  setActiveStop(insertAt);
  const sl=document.getElementById('sidebar-scroll');sl.scrollTop=sl.scrollHeight;
  toast('✓ Parada añadida — haz clic en el mapa para ubicarla');
  startPlacing(insertAt);
}

function removeStop(idx){
  stops.splice(idx,1);
  recalcTimes();
  renderStopsList();
  renderMarkers();
  updateRoute();
  stopPlacing();
}

function moveStop(idx,dir){
  const dayNum=stops[idx].day;
  const sameDay=stops.map((_,i)=>i).filter(i=>stops[i].day===dayNum);
  const pos=sameDay.indexOf(idx);
  const newPos=pos+dir;
  if(newPos<0||newPos>=sameDay.length)return;
  const other=sameDay[newPos];
  [stops[idx],stops[other]]=[stops[other],stops[idx]];
  recalcTimes();renderStopsList();renderMarkers();updateRoute();
}

function changeStopDay(idx,val){
  stops[idx].day=parseInt(val)||1;
  recalcTimes();renderStopsList();renderMarkers();updateRoute();
}

function recalcTimes(){
  days.forEach((day,di)=>{
    const dayNum=di+1;
    const dayStops=stops.filter(s=>s.day===dayNum);
    if(!dayStops.length)return;
    let[h,m]=(day.start||'09:00').split(':').map(Number);
    dayStops.forEach(s=>{
      s.time=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      m+=s.stayMin+10;h+=Math.floor(m/60);m%=60;
    });
  });
}

function recalcAllTimes(){recalcTimes();renderStopsList()}

function setActiveStop(idx){
  editingStop=idx;
  renderStopsList();
  const s=stops[idx];
  if(s.lat&&s.lng)map.panTo([s.lat,s.lng],{animate:true});
}

function getStopFromForm(idx){
  const pfx='s'+idx+'_';
  stops[idx].name=document.getElementById(pfx+'name')?.value||stops[idx].name;
  stops[idx].dur=document.getElementById(pfx+'dur')?.value||stops[idx].dur;
  stops[idx].stayMin=parseInt(document.getElementById(pfx+'stay')?.value)||stops[idx].stayMin;
  stops[idx].desc=document.getElementById(pfx+'desc')?.value||'';
  stops[idx].wiki=document.getElementById(pfx+'wiki')?.value||'';
  const latV=parseFloat(document.getElementById(pfx+'lat')?.value);
  const lngV=parseFloat(document.getElementById(pfx+'lng')?.value);
  if(!isNaN(latV))stops[idx].lat=latV;
  if(!isNaN(lngV))stops[idx].lng=lngV;
}

function syncAllForms(){stops.forEach((_,i)=>getStopFromForm(i))}

function renderStopsList(){
  const el=document.getElementById('stops-list');
  const empty=document.getElementById('stops-empty');
  document.getElementById('stop-count').textContent=stops.length;
  empty.style.display=stops.length?'none':'block';
  document.getElementById('preview-btn').style.display=stops.length?'':'none';
  el.innerHTML='';
  days.forEach((day,di)=>{
    const dayNum=di+1;
    const dayStops=stops.map((s,i)=>({s,i})).filter(o=>o.s.day===dayNum);
    const hd=document.createElement('div');
    hd.className='day-section-hd';
    hd.innerHTML=`<span>📅 Día ${dayNum}${day.date?' · '+fmtDateLong(day.date):''}</span><button class="add-stop-btn" onclick="addStop(${dayNum})">+ Parada</button>`;
    el.appendChild(hd);
    if(!dayStops.length){
      const e=document.createElement('div');e.className='day-empty';e.textContent='Sin paradas en este día';el.appendChild(e);
    }
    dayStops.forEach(({s,i},localPos)=>{
      const isOpen=editingStop===i;
      const div=document.createElement('div');
      div.className='stop-card'+(isOpen?' active':'');
      div.dataset.idx=i;
      const hasCoords=s.lat!==null&&s.lng!==null;
      const isFirst=localPos===0,isLast=localPos===dayStops.length-1;
      div.innerHTML=`
        <div class="stop-head" onclick="toggleStop(${i})">
          <div class="stop-num${isFirst?' first':''}">${localPos+1}</div>
          <div class="stop-name-preview">${esc(s.name)}</div>
          <div class="stop-time-preview">${s.time}</div>
          <div class="stop-actions">
            ${!isFirst?`<button class="stop-act" title="Subir" onclick="event.stopPropagation();moveStop(${i},-1)">↑</button>`:''}
            ${!isLast?`<button class="stop-act" title="Bajar" onclick="event.stopPropagation();moveStop(${i},1)">↓</button>`:''}
            <button class="stop-act" title="Eliminar" onclick="event.stopPropagation();removeStop(${i})">🗑</button>
          </div>
        </div>
        <div class="stop-body${isOpen?' open':''}" id="sbody_${i}">
          <div class="stop-map-hint">${hasCoords?(s.address?`📍 ${esc(s.address)}`:`📍 ${s.lat.toFixed(4)}, ${s.lng.toFixed(4)}`):'⚠ Sin ubicación conocida'}</div>
          <div class="geo-search">
            <input type="text" id="s${i}_geo" placeholder="🔍 Buscar dirección o lugar (ej. Panteón de Roma)" oninput="scheduleGeoSearch(${i})">
            <div class="geo-results" id="georesults_${i}"></div>
          </div>
          <button class="drop-pin-btn${placingStopIdx===i?' waiting':''}" onclick="startPlacing(${i})">
            ${placingStopIdx===i?'⏳ Haz clic en el mapa…':'📍 Colocar en el mapa'}
          </button>
          <div class="field" style="margin-top:10px">
            <label>Nombre</label>
            <input type="text" id="s${i}_name" value="${esc(s.name)}" oninput="stops[${i}].name=this.value;updatePreviewName(${i},this.value)">
          </div>
          ${days.length>1?`<div class="field">
            <label>Día</label>
            <select id="s${i}_day" onchange="changeStopDay(${i},this.value)">
              ${days.map((d,ddi)=>`<option value="${ddi+1}" ${s.day===ddi+1?'selected':''}>Día ${ddi+1}${d.date?' · '+fmtDateShort(d.date):''}</option>`).join('')}
            </select>
          </div>`:''}
          <div class="field-row">
            <div class="field">
              <label>Duración</label>
              <input type="text" id="s${i}_dur" value="${esc(s.dur)}" placeholder="30 min · gratis" oninput="stops[${i}].dur=this.value">
            </div>
            <div class="field" style="max-width:80px">
              <label>Min estancia</label>
              <input type="text" id="s${i}_stay" value="${s.stayMin}" oninput="stops[${i}].stayMin=parseInt(this.value)||30;recalcTimes();updateTimePreviews()">
            </div>
          </div>
          <div class="field">
            <label>Descripción</label>
            <textarea id="s${i}_desc" rows="3" placeholder="Descripción de la parada…" style="resize:vertical" oninput="stops[${i}].desc=this.value">${esc(s.desc)}</textarea>
          </div>
          <div class="field">
            <label>Wikipedia URL</label>
            <input type="text" id="s${i}_wiki" value="${esc(s.wiki)}" placeholder="https://es.wikipedia.org/wiki/…" oninput="stops[${i}].wiki=this.value">
          </div>
          <div class="coords-row">
            <input type="text" id="s${i}_lat" placeholder="Lat" value="${s.lat??''}" oninput="updateLatLng(${i})">
            <input type="text" id="s${i}_lng" placeholder="Lng" value="${s.lng??''}" oninput="updateLatLng(${i})">
          </div>
          <label>Etiquetas</label>
          <div class="tags-wrap" id="tags_${i}"></div>
          <div class="add-tag-row">
            <input type="text" id="tag_input_${i}" placeholder="Gratis, Museo…" onkeydown="if(event.key==='Enter')addTag(${i})">
            <select id="tag_color_${i}">
              <option value="">Normal</option>
              <option value="g">Verde</option>
              <option value="b">Azul</option>
            </select>
            <button onclick="addTag(${i})">+</button>
          </div>
        </div>`;
      el.appendChild(div);
      renderTags(i);
    });
  });
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

let geoSearchTimers={};
let geoReverseTimers={};
let geoResultsCache={};

function scheduleGeoSearch(i){
  clearTimeout(geoSearchTimers[i]);
  geoSearchTimers[i]=setTimeout(()=>geoSearch(i),500);
}

function geoSearch(i){
  const q=document.getElementById('s'+i+'_geo')?.value.trim();
  const box=document.getElementById('georesults_'+i);
  if(!q){if(box){box.classList.remove('on');box.innerHTML=''}return}
  if(box){box.innerHTML='<div class="geo-result disabled">Buscando…</div>';box.classList.add('on')}
  fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=5&q=${encodeURIComponent(q)}`)
    .then(r=>r.json())
    .then(results=>{
      geoResultsCache[i]=results;
      if(!box)return;
      if(!results.length){box.innerHTML='<div class="geo-result disabled">Sin resultados</div>';return}
      box.innerHTML=results.map((r,gi)=>`<div class="geo-result" onclick="pickGeoResult(${i},${gi})">${esc(r.display_name)}</div>`).join('');
    })
    .catch(()=>{if(box)box.innerHTML='<div class="geo-result disabled">Error de búsqueda</div>'});
}

function pickGeoResult(i,gi){
  const r=geoResultsCache[i]?.[gi];
  if(!r)return;
  stops[i].lat=parseFloat(parseFloat(r.lat).toFixed(6));
  stops[i].lng=parseFloat(parseFloat(r.lon).toFixed(6));
  stops[i].address=r.display_name;
  if(!stops[i].name||stops[i].name==='Parada')stops[i].name=(r.display_name||'').split(',')[0];
  const box=document.getElementById('georesults_'+i);
  if(box){box.classList.remove('on');box.innerHTML=''}
  const geoInput=document.getElementById('s'+i+'_geo');
  if(geoInput)geoInput.value='';
  renderStopsList();
  renderMarkers();
  updateRoute();
  setActiveStop(i);
}

function scheduleReverseGeocode(i){
  clearTimeout(geoReverseTimers[i]);
  geoReverseTimers[i]=setTimeout(()=>reverseGeocode(i),900);
}

function reverseGeocode(i){
  const s=stops[i];
  if(!s||s.lat===null||s.lng===null)return;
  fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${s.lat}&lon=${s.lng}`)
    .then(r=>r.json())
    .then(data=>{
      if(!stops[i]||stops[i].lat!==s.lat||stops[i].lng!==s.lng)return;
      if(data&&data.display_name){
        stops[i].address=data.display_name;
        const hint=document.querySelector('#sbody_'+i+' .stop-map-hint');
        if(hint)hint.textContent=`📍 ${data.display_name}`;
      }
    })
    .catch(()=>{});
}

function toggleStop(i){
  if(editingStop===i){editingStop=null;renderStopsList()}
  else setActiveStop(i);
}

function updatePreviewName(i,v){
  const el=document.querySelector(`.stop-card[data-idx="${i}"] .stop-name-preview`);
  if(el)el.textContent=v||'(sin nombre)';
}
function updateTimePreviews(){
  document.querySelectorAll('.stop-card').forEach(card=>{
    const i=parseInt(card.dataset.idx);
    const el=card.querySelector('.stop-time-preview');
    if(el&&stops[i])el.textContent=stops[i].time;
  });
}

function updateLatLng(i){
  const lat=parseFloat(document.getElementById('s'+i+'_lat')?.value);
  const lng=parseFloat(document.getElementById('s'+i+'_lng')?.value);
  if(!isNaN(lat)&&!isNaN(lng)){
    stops[i].lat=lat;stops[i].lng=lng;stops[i].address='';
    renderMarkers();updateRoute();
    const hint=document.querySelector('#sbody_'+i+' .stop-map-hint');
    if(hint)hint.textContent=`📍 ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    scheduleReverseGeocode(i);
  }
}

function renderTags(i){
  const wrap=document.getElementById('tags_'+i);if(!wrap)return;
  wrap.innerHTML=(stops[i].tags||[]).map((t,ti)=>`
    <div class="tag-chip">
      <span style="${t.c==='g'?'color:var(--g)':t.c==='b'?'color:var(--b)':''}">${esc(t.t)}</span>
      <button class="del-tag" onclick="removeTag(${i},${ti})">x</button>
    </div>`).join('');
}
function addTag(i){
  const inp=document.getElementById('tag_input_'+i);
  const col=document.getElementById('tag_color_'+i);
  const v=inp?.value.trim();if(!v)return;
  stops[i].tags=stops[i].tags||[];
  stops[i].tags.push({t:v,c:col?.value||''});
  inp.value='';renderTags(i);
}
function removeTag(i,ti){stops[i].tags.splice(ti,1);renderTags(i)}

function renderMarkers(){
  stopMarkers.forEach(m=>map.removeLayer(m));stopMarkers.length=0;
  stops.forEach((s,i)=>{
    if(s.lat===null||s.lng===null)return;
    const mk=L.marker([s.lat,s.lng],{
      icon:L.divIcon({className:'',
        html:`<div style="width:26px;height:26px;border-radius:50%;background:${i===0?'#5edd8a':'#5bb8f5'};color:#0a0c12;font-family:monospace;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.3);box-shadow:0 2px 8px rgba(0,0,0,.7)">${i+1}</div>`,
        iconSize:[26,26],iconAnchor:[13,13]}),
      draggable:true,zIndexOffset:200
    }).addTo(map);
    mk.on('click',()=>setActiveStop(i));
    mk.on('dragend',e=>{const{lat,lng}=e.target.getLatLng();stops[i].lat=parseFloat(lat.toFixed(6));stops[i].lng=parseFloat(lng.toFixed(6));stops[i].address='';updateRoute();const latEl=document.getElementById('s'+i+'_lat');const lngEl=document.getElementById('s'+i+'_lng');if(latEl)latEl.value=stops[i].lat;if(lngEl)lngEl.value=stops[i].lng;const hint=document.querySelector('#sbody_'+i+' .stop-map-hint');if(hint)hint.textContent=`📍 ${stops[i].lat.toFixed(4)}, ${stops[i].lng.toFixed(4)}`;reverseGeocode(i)});
    stopMarkers.push(mk);
  });
  const placed=stops.filter(s=>s.lat!==null&&s.lng!==null);
  if(placed.length>0)map.fitBounds(L.latLngBounds(placed.map(s=>[s.lat,s.lng])),{padding:[40,40]});
}

async function updateRoute(){
  if(routeLine){map.removeLayer(routeLine);routeLine=null}
  const placed=stops.filter(s=>s.lat!==null&&s.lng!==null);
  if(placed.length<2)return;
  const lls=placed.map(s=>[s.lat,s.lng]);
  routeLine=L.polyline(lls,{color:'#5bb8f5',weight:2.5,opacity:.6,dashArray:'6 4'}).addTo(map);
  try{
    const coords=placed.map(s=>`${s.lng},${s.lat}`).join(';');
    const r=await fetch(`https://router.project-osrm.org/route/v1/foot/${coords}?overview=full&geometries=geojson&alternatives=false&continue_straight=false`,{signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    if(d.code==='Ok'&&d.routes?.length){
      if(routeLine)map.removeLayer(routeLine);
      const real=d.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
      routeLine=L.polyline(real,{color:'#5bb8f5',weight:3,opacity:.85}).addTo(map);
    }
  }catch(e){}
}

function loadExisting(){
  const data=LS.get('tour_data_'+EDIT_ID);
  if(!data){toast('⚠ Tour no encontrado');return}
  document.getElementById('t-city').value=data.city||'';
  document.getElementById('t-country').value=data.country||'';
  document.getElementById('t-emoji').value=data.emoji||'📍';
  document.getElementById('t-duration').value=data.duration||'';
  updateTitle();
  days=(data.days&&data.days.length)?data.days.map(d=>({date:d.date||'',start:d.start||'09:00'})):[{date:'',start:data.startTime||'09:00'}];
  renderDaysList();
  stops=(data.stops||[]).map((s,i)=>({...s,_id:s._id||genId(),day:s.day||1}));
  renderStopsList();
  renderMarkers();
  updateRoute();
}

function buildTourData(){
  syncAllForms();
  const meta=getTourMeta();
  const placed=stops.filter(s=>s.lat!==null&&s.lng!==null);
  const center=placed.length?[placed[0].lat,placed[0].lng]:(EDIT_ID?LS.get('tour_data_'+EDIT_ID)?.center||null:null);
  return{
    ...meta,
    title:`${meta.emoji} ${meta.city} · Tour`,
    header:`${meta.emoji} ${meta.city.toUpperCase()} · ${meta.startTime}`,
    center,zoom:15,
    days:days.map(d=>({date:d.date||'',start:d.start||'09:00'})),
    stops:stops.map((s,i)=>({...s,n:i+1}))
  };
}

function save(){
  if(!document.getElementById('t-city').value.trim()){toast('⚠ Añade el nombre de la ciudad');return}
  if(!stops.length){toast('⚠ Añade al menos una parada');return}
  const data=buildTourData();
  const idx=LS.get('tours_index',{});
  idx[data.id]={id:data.id,city:data.city,country:data.country,emoji:data.emoji,
    stops:stops.length,duration:data.duration,custom:true,updatedAt:Date.now(),
    days:days.length,dateStart:days[0]?.date||'',dateEnd:days[days.length-1]?.date||''};
  LS.set('tours_index',idx);
  LS.set('tour_data_'+data.id,data);
  toast('✓ Tour guardado');
  document.getElementById('preview-btn').style.display='';
}

function preview(){
  save();
  const data=buildTourData();
  window.open(`tour.html?id=${data.id}&custom=1`,'_blank');
}

function openExport(){syncAllForms();document.getElementById('export-panel').classList.add('open')}
function closeExport(){document.getElementById('export-panel').classList.remove('open')}

function downloadJSON(){
  const data=buildTourData();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${data.id}.json`;a.click();
  toast('✓ Descargado');closeExport();
}

function copyLink(){
  save();
  const data=buildTourData();
  const url=`${location.origin}${location.pathname.replace('editor.html','tour.html')}?id=${data.id}&custom=1`;
  navigator.clipboard?.writeText(url).then(()=>toast('✓ Link copiado')).catch(()=>toast('Link: '+url));
  closeExport();
}

function confirmBack(){
  if(stops.length&&!confirm('¿Salir sin guardar? Los cambios se perderán si no guardas.'))return;
  location.href='index.html';
}
</script>
